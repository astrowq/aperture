services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - aperture_data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/aperture.db
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  aperture_data:
